<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Хто не платить за Озеро 🎡😄</title>
<meta name="description" content="Колесо фортуни — хто не платить за Озеро?" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Comfortaa:wght@400;500;700&display=swap&subset=cyrillic" rel="stylesheet" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎡%3C/text%3E%3C/svg%3E" />
<style>
  :root {
    --hot: #ff4f9a;
    --hot-deep: #e8348a;
    --soft: #ffd6e8;
    --cream: #fff0f7;
    --plum: #6b1f4d;
    --gold: #ffd24c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: 'Comfortaa', system-ui, sans-serif;
    color: var(--plum);
    min-height: 100%;
    background:
      radial-gradient(circle at 20% 15%, #ffe3f1 0%, transparent 45%),
      radial-gradient(circle at 80% 10%, #ffd0ea 0%, transparent 40%),
      radial-gradient(circle at 50% 100%, #ffbcdd 0%, transparent 55%),
      linear-gradient(160deg, #ffe9f4 0%, #ffc8e3 55%, #ff9ecb 100%);
    background-attachment: fixed;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
    overflow-x: hidden;
    position: relative;
  }

  /* floating hearts */
  .heart {
    position: fixed;
    bottom: -40px;
    font-size: 22px;
    opacity: .55;
    pointer-events: none;
    animation: float linear infinite;
    z-index: 0;
    user-select: none;
  }
  @keyframes float {
    to { transform: translateY(-115vh) rotate(360deg); opacity: 0; }
  }

  header { text-align: center; z-index: 2; margin-bottom: 6px; max-width: 820px; }

  h1 {
    font-family: 'Pacifico', cursive;
    font-weight: 400;
    font-size: clamp(1.45rem, 4.6vw, 2.9rem);
    line-height: 1.35;
    color: #fff;
    text-shadow: 0 3px 0 var(--hot-deep), 0 6px 18px rgba(184, 30, 110, .45);
    padding: 4px 8px;
  }

  .subtitle {
    margin-top: 10px;
    font-size: clamp(.8rem, 2.4vw, 1rem);
    color: var(--plum);
    opacity: .85;
    font-weight: 500;
  }

  .stage {
    position: relative;
    margin-top: 22px;
    width: min(86vw, 460px);
    aspect-ratio: 1 / 1;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* glowing ring behind wheel */
  .stage::before {
    content: "";
    position: absolute;
    inset: -14px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #fff0, #fff6, #fff0, #fff6, #fff0);
    filter: blur(8px);
    animation: spinHalo 9s linear infinite;
    z-index: -1;
  }
  @keyframes spinHalo { to { transform: rotate(360deg); } }

  .wheel-wrap {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    padding: 12px;
    background:
      radial-gradient(circle at 50% 30%, #ffffff, #ffd9ec 60%, #ff9ccb 100%);
    box-shadow:
      0 0 0 8px #fff,
      0 0 0 12px var(--hot),
      0 18px 40px rgba(180, 25, 105, .4),
      inset 0 2px 10px rgba(255,255,255,.7);
  }

  canvas#wheel {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    display: block;
    transition: transform 6s cubic-bezier(.12, .67, .12, .99);
    will-change: transform;
  }

  /* center hub */
  .hub {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 19%;
    height: 19%;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff, #ffb8da 70%, var(--hot) 100%);
    box-shadow: 0 4px 12px rgba(150,20,90,.5), inset 0 2px 4px #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(1rem, 4vw, 1.7rem);
    z-index: 4;
    pointer-events: none;
  }

  /* pointer at top */
  .pointer {
    position: absolute;
    top: -6px; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 20px solid transparent;
    border-right: 20px solid transparent;
    border-top: 34px solid var(--gold);
    filter: drop-shadow(0 4px 4px rgba(150,20,90,.5));
    z-index: 5;
  }
  .pointer::after {
    content: "";
    position: absolute;
    top: -42px; left: 50%;
    transform: translateX(-50%);
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: inset 0 -2px 3px rgba(160,90,0,.4);
  }

  .spin-btn {
    margin-top: 34px;
    z-index: 2;
    font-family: 'Comfortaa', sans-serif;
    font-weight: 700;
    font-size: clamp(1.05rem, 3.4vw, 1.4rem);
    color: #fff;
    letter-spacing: .5px;
    border: none;
    cursor: pointer;
    padding: 16px 44px;
    border-radius: 999px;
    background: linear-gradient(135deg, #ff6fae, var(--hot-deep));
    box-shadow: 0 8px 0 #c42a78, 0 14px 24px rgba(180,25,105,.45);
    transition: transform .08s, box-shadow .08s, filter .2s;
    user-select: none;
  }
  .spin-btn:hover { filter: brightness(1.06); }
  .spin-btn:active { transform: translateY(6px); box-shadow: 0 2px 0 #c42a78, 0 6px 14px rgba(180,25,105,.4); }
  .spin-btn:disabled { filter: grayscale(.3) brightness(.95); cursor: not-allowed; opacity: .7; }

  /* result modal */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(120, 20, 75, .35);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity .35s;
    z-index: 50;
    padding: 20px;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }

  .card {
    background: linear-gradient(160deg, #fff, var(--cream));
    border-radius: 28px;
    padding: 34px 30px 30px;
    text-align: center;
    max-width: 380px;
    width: 100%;
    box-shadow: 0 24px 60px rgba(150,20,90,.5);
    border: 3px solid var(--hot);
    transform: scale(.7);
    transition: transform .4s cubic-bezier(.2,1.4,.4,1);
  }
  .overlay.show .card { transform: scale(1); }

  .card .crown { font-size: 3rem; }
  .card h2 {
    font-family: 'Pacifico', cursive;
    font-weight: 400;
    font-size: 2rem;
    color: var(--hot-deep);
    margin: 6px 0 4px;
  }
  .card .winner {
    font-size: 2.6rem;
    font-weight: 700;
    color: var(--plum);
    margin: 4px 0 10px;
  }
  .card p { font-size: .98rem; line-height: 1.5; opacity: .9; }
  .card .again {
    margin-top: 22px;
    font-family: 'Comfortaa', sans-serif;
    font-weight: 700;
    font-size: 1.05rem;
    color: #fff;
    border: none;
    cursor: pointer;
    padding: 13px 34px;
    border-radius: 999px;
    background: linear-gradient(135deg, #ff6fae, var(--hot-deep));
    box-shadow: 0 6px 16px rgba(180,25,105,.4);
  }

  footer {
    margin-top: 40px;
    font-size: .8rem;
    opacity: .7;
    text-align: center;
    z-index: 2;
  }

  canvas#confetti {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 60;
  }
</style>
</head>
<body>

  <header>
    <h1>Хто не платить за Озеро<br /></h1>
    <p class="subtitle">Крути колесо долі — воно не помиляється 😄</p>
  </header>

  <div class="stage">
    <div class="pointer"></div>
    <div class="wheel-wrap">
      <canvas id="wheel" width="900" height="900"></canvas>
    </div>
    <div class="hub">🎀</div>
  </div>

  <button class="spin-btn" id="spinBtn">Крутити! 🎡</button>

  <div class="overlay" id="overlay">
    <div class="card">
      <div class="crown">👑</div>
      <h2>Переможниця</h2>
      <div class="winner" id="winnerName">Софія</div>
      <p id="winnerMsg">Колесо все вирішило чесно та неупереджено 😇 Озеро лишається безкоштовним саме для тебе 💅</p>
      <button class="again" id="againBtn">Крутити ще 🔁</button>
    </div>
  </div>

  <footer>зроблено в рожевому настрої 😎</footer>

  <canvas id="confetti"></canvas>

<script>
(function () {
  const NAMES = [
    "Михайло", "Ростик", "Іван", "Остап", "Денис", "Оксана",
    "Ліза", "Павло", "Мар'яна", "Христина", "Софія", "Оленка"
  ];
  // 🤫 секрет жарту: колесо завжди зупиняється на Софії
  const RIGGED = "Софія";

  const PALETTE = ["#ff6fae", "#ffa9d2", "#ff86bf", "#ffc2de", "#ff5fa2", "#ffb6d8"];

  const canvas = document.getElementById("wheel");
  const ctx = canvas.getContext("2d");
  const SIZE = canvas.width;
  const R = SIZE / 2;
  const N = NAMES.length;
  const seg = (Math.PI * 2) / N;

  function drawWheel() {
    ctx.clearRect(0, 0, SIZE, SIZE);
    for (let i = 0; i < N; i++) {
      const start = i * seg;
      const end = start + seg;
      // segment
      ctx.beginPath();
      ctx.moveTo(R, R);
      ctx.arc(R, R, R - 6, start, end);
      ctx.closePath();
      ctx.fillStyle = PALETTE[i % PALETTE.length];
      ctx.fill();
      ctx.lineWidth = 3;
      ctx.strokeStyle = "rgba(255,255,255,.85)";
      ctx.stroke();

      // text (flip names on the left half so they stay upright)
      ctx.save();
      ctx.translate(R, R);
      const mid = start + seg / 2;
      ctx.rotate(mid);
      ctx.fillStyle = "#5e1740";
      ctx.font = "600 36px Comfortaa, sans-serif";
      ctx.shadowColor = "rgba(255,255,255,.6)";
      ctx.shadowBlur = 4;
      const flip = mid > Math.PI / 2 && mid < (Math.PI * 3) / 2;
      if (flip) {
        ctx.rotate(Math.PI);
        ctx.textAlign = "left";
        ctx.fillText(NAMES[i], -(R - 34), 13);
      } else {
        ctx.textAlign = "right";
        ctx.fillText(NAMES[i], R - 34, 13);
      }
      ctx.restore();
    }
    // outer dots decoration
    for (let i = 0; i < N; i++) {
      const a = i * seg;
      const x = R + Math.cos(a) * (R - 3);
      const y = R + Math.sin(a) * (R - 3);
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.fillStyle = "#fff";
      ctx.fill();
    }
  }
  drawWheel();

  // ---- spin logic ----
  const targetIndex = NAMES.indexOf(RIGGED);
  let currentRot = 0;
  let spinning = false;

  const spinBtn = document.getElementById("spinBtn");
  const overlay = document.getElementById("overlay");
  const againBtn = document.getElementById("againBtn");

  function spin() {
    if (spinning) return;
    spinning = true;
    spinBtn.disabled = true;

    // Segment i is drawn from i*seg to (i+1)*seg (clockwise, 0 = 3 o'clock).
    // Its CENTER sits at (i+0.5)*seg. The pointer is at the TOP = -90° = 1.5π.
    // We want center + rotation ≡ -90° (mod 2π).
    const center = (targetIndex + 0.5) * seg;
    const pointer = -Math.PI / 2;
    // small jitter so it's not pixel-perfect every time, but stays on Софія
    const jitter = (Math.random() - 0.5) * seg * 0.55;
    const turns = 6 + Math.floor(Math.random() * 3); // 6–8 full turns

    let base = currentRot % (Math.PI * 2);
    let delta = (pointer - center - jitter) - base;
    delta = ((delta % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2); // 0..2π forward
    currentRot += turns * Math.PI * 2 + delta;

    canvas.style.transform = `rotate(${currentRot}rad)`;
  }

  canvas.addEventListener("transitionend", () => {
    if (!spinning) return;
    spinning = false;
    showWinner();
  });

  function showWinner() {
    overlay.classList.add("show");
    burstConfetti();
  }

  spinBtn.addEventListener("click", spin);
  againBtn.addEventListener("click", () => {
    overlay.classList.remove("show");
    spinBtn.disabled = false;
  });

  // ---- confetti ----
  const cc = document.getElementById("confetti");
  const cx = cc.getContext("2d");
  let parts = [];
  function resize() { cc.width = innerWidth; cc.height = innerHeight; }
  resize();
  addEventListener("resize", resize);

  const COLORS = ["#ff4f9a", "#ffd24c", "#ff9ecb", "#fff", "#ff86bf", "#ffe3f1"];
  function burstConfetti() {
    for (let i = 0; i < 160; i++) {
      parts.push({
        x: innerWidth / 2,
        y: innerHeight / 2.4,
        vx: (Math.random() - 0.5) * 16,
        vy: Math.random() * -16 - 4,
        g: 0.4 + Math.random() * 0.2,
        s: 6 + Math.random() * 8,
        c: COLORS[(Math.random() * COLORS.length) | 0],
        rot: Math.random() * Math.PI,
        vr: (Math.random() - 0.5) * 0.3,
        life: 120 + Math.random() * 40
      });
    }
    if (!rafRunning) { rafRunning = true; tick(); }
  }
  let rafRunning = false;
  function tick() {
    cx.clearRect(0, 0, cc.width, cc.height);
    parts.forEach(p => {
      p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.life--;
      cx.save();
      cx.translate(p.x, p.y);
      cx.rotate(p.rot);
      cx.fillStyle = p.c;
      cx.fillRect(-p.s / 2, -p.s / 2, p.s, p.s * 0.6);
      cx.restore();
    });
    parts = parts.filter(p => p.life > 0 && p.y < cc.height + 40);
    if (parts.length) { requestAnimationFrame(tick); }
    else { rafRunning = false; cx.clearRect(0, 0, cc.width, cc.height); }
  }

  // ---- floating hearts ----
  const EMOJIS = ["😄", "😁", "😆", "😜", "🤩", "😎", "😝", "😺"];
  for (let i = 0; i < 14; i++) {
    const h = document.createElement("div");
    h.className = "heart";
    h.textContent = EMOJIS[(Math.random() * EMOJIS.length) | 0];
    h.style.left = Math.random() * 100 + "vw";
    h.style.fontSize = 16 + Math.random() * 22 + "px";
    h.style.animationDuration = 9 + Math.random() * 10 + "s";
    h.style.animationDelay = -Math.random() * 12 + "s";
    document.body.appendChild(h);
  }
})();
</script>
</body>
</html>
